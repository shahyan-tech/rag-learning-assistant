apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-frontend
  namespace: rag-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-frontend
  template:
    metadata:
      labels:
        app: rag-frontend
    spec:
      containers:
        - name: rag-frontend
          image: rag-learning-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
