services:
  backend:
    build:
      context: ./backend
    container_name: rag-learning-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/workspace/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: rag-learning-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped